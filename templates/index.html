{% extends 'base.html' %}
{% load static %}

{% block content %}
<h2 class="text-center mt-5 mb-5">
    Bienvenido/a a nuestro E_commerce ♡
</h2>

{% if not user.is_authenticated %}

<h5 class="text-center mt-5 mb-5">Inicia sesión para acceder a nuestros productos</h5>

<div class="text-center mt-5 mb-5">
    <a href="{% url 'login' %}" class="btn btn-outline-success">Iniciar sesión</a>
</div>

{% endif %}

<div class="text-center mt-5 mb-5">
    <img src="{% static 'ecommerce/img/mages_cat.jpg' %}" alt="Mages Cats">
</div>

{% endblock %}
